name: Update TrendStat data

on:
  schedule:
    # GitHub cron uses UTC. Collection runs hourly on the 14th-15th.
    - cron: "0 * 11,12 * *"
    # Build the dashboard after sales data is usually available.
    - cron: "0 6 21 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Что запустить"
        required: true
        default: collect
        type: choice
        options:
          - collect
          - build

permissions:
  contents: write

concurrency:
  group: trendstat-monthly-update
  cancel-in-progress: false

jobs:
  collect-wordstat:
    name: Collect Wordstat batch
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 * 14,15 * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'collect')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Create Google credentials file
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          value = os.environ.get("GOOGLE_CREDENTIALS_JSON")
          if not value:
              raise SystemExit("Secret GOOGLE_CREDENTIALS is missing")
          Path("google_creds.json").write_text(value, encoding="utf-8")
          PY

      - name: Collect up to 90 Wordstat requests
        env:
          YANDEX_API_KEY: ${{ secrets.YANDEX_API_KEY }}
          FOLDER_ID: ${{ secrets.FOLDER_ID }}
        run: python wordstate.py

  build-dashboard:
    name: Build and publish dashboard data
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 6 16 * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'build')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Create Google credentials file
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          value = os.environ.get("GOOGLE_CREDENTIALS_JSON")
          if not value:
              raise SystemExit("Secret GOOGLE_CREDENTIALS is missing")
          Path("google_creds.json").write_text(value, encoding="utf-8")
          PY

      - name: Update vehicle sales
        run: python autostat.py

      - name: Build data.json
        env:
          YANDEX_API_KEY: ${{ secrets.YANDEX_API_KEY }}
          FOLDER_ID: ${{ secrets.FOLDER_ID }}
        run: python processor.py

      - name: Commit updated dashboard data
        run: |
          if git diff --quiet -- data.json; then
            echo "data.json is already up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Update dashboard data"
          git push
